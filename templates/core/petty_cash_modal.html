<!-- Petty Cash / Counter Drawdown modal — included on bar_board, kitchen_board, quick_sell -->
<div class="modal fade" id="pettyCashModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="background:#2a2a2a;border:1px solid #3a3a3a;border-radius:12px;">
      <div class="modal-header" style="border-bottom:1px solid #333;">
        <h6 class="modal-title" style="color:#ff9800;">🪙 Counter Cash</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="padding:.85rem;">
        <div style="color:#b0b0b0;font-size:.8rem;margin-bottom:.75rem;">
          Rekodi pesa iliyochukuliwa kutoka kaunta wakati wa huduma — mwenye biashara atakagua baadaye.
        </div>
        <div style="margin-bottom:.5rem;">
          <label style="color:#b0b0b0;font-size:.78rem;display:block;margin-bottom:.2rem;">Sababu</label>
          <select id="pc-reason" style="width:100%;background:#111;border:1px solid #333;border-radius:6px;color:#f0ece4;padding:.4rem .6rem;font-size:.85rem;">
            <option value="electricity">⚡ Umeme / Tokens</option>
            <option value="supplies">🧻 Vifaa (Tissues, Serviettes, etc.)</option>
            <option value="transport">🚗 Usafiri / Delivery</option>
            <option value="fuel">⛽ Mafuta / Gesi</option>
            <option value="food">🍽 Chakula cha Wafanyakazi</option>
            <option value="other">📝 Nyingine</option>
          </select>
        </div>
        <div style="margin-bottom:.5rem;">
          <label style="color:#b0b0b0;font-size:.78rem;display:block;margin-bottom:.2rem;">Kiasi (KES)</label>
          <input type="number" id="pc-amount" min="1" step="1" placeholder="e.g. 200"
                 style="width:100%;background:#111;border:1px solid #333;border-radius:6px;color:#f0ece4;padding:.4rem .6rem;font-size:.9rem;">
        </div>
        <div style="margin-bottom:.4rem;">
          <label style="color:#b0b0b0;font-size:.78rem;display:block;margin-bottom:.2rem;">Maelezo zaidi (hiari)</label>
          <input type="text" id="pc-description" placeholder="e.g. Tokens za KPLC 100 units"
                 style="width:100%;background:#111;border:1px solid #333;border-radius:6px;color:#f0ece4;padding:.4rem .6rem;font-size:.82rem;">
        </div>
        <div id="pc-error" style="display:none;color:#c0395a;font-size:.8rem;margin-top:.35rem;"></div>
      </div>
      <div class="modal-footer" style="border-top:1px solid #333;padding:.75rem;">
        <button id="pc-submit-btn" class="btn btn-sm w-100"
                style="background:rgba(255,152,0,.15);border:1px solid rgba(255,152,0,.4);color:#ff9800;font-weight:600;"
                onclick="window._submitPettyCash()">
          🪙 Rekodi & Endelea
        </button>
      </div>
    </div>
  </div>
</div>
