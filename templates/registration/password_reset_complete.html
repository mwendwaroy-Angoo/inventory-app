{% extends "base.html" %}

{% block title %}Password Reset Complete — Duka Mwecheche{% endblock %}

{% block extra_css %}
<style>
    .reset-card {
        max-width: 420px;
        margin: 4rem auto;
        background: var(--onyx-card);
        border: 1px solid #333;
        border-top: 3px solid var(--gold);
        border-radius: 12px;
        overflow: hidden;
    }

    .reset-header {
        background: linear-gradient(135deg, var(--raspberry-dark), var(--raspberry));
        padding: 2rem;
        text-align: center;
    }

    .reset-header h2 {
        font-family: 'Playfair Display', serif;
        color: var(--white);
        margin: 0;
        font-size: 1.6rem;
    }

    .reset-body { padding: 2rem; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="reset-card">
    <div class="reset-header">
        <h2>Password Reset!</h2>
    </div>
    <div class="reset-body">
        <p style="font-size: 2.5rem; margin-bottom: 1rem;">✅</p>
        <p>Your password has been set successfully. You can now log in with your new password.</p>
        <hr class="gold-divider mt-3">
        <a href="{% url 'login' %}" class="btn btn-gold px-4">Log In</a>
    </div>
</div>
{% endblock %}
