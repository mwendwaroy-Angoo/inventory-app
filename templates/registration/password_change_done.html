{% extends "base.html" %}

{% block title %}Password Changed — Duka Mwecheche{% endblock %}

{% block extra_css %}
<style>
    .change-card {
        max-width: 420px;
        margin: 3rem auto;
        background: var(--onyx-card);
        border: 1px solid #333;
        border-top: 3px solid var(--gold);
        border-radius: 12px;
        overflow: hidden;
    }

    .change-header {
        background: linear-gradient(135deg, var(--raspberry-dark), var(--raspberry));
        padding: 1.5rem 2rem;
        text-align: center;
    }

    .change-header h2 {
        font-family: 'Playfair Display', serif;
        color: var(--white);
        margin: 0;
        font-size: 1.5rem;
    }

    .change-body { padding: 2rem; text-align: center; }
</style>
{% endblock %}

{% block content %}
<div class="change-card">
    <div class="change-header">
        <h2>Password Updated!</h2>
    </div>
    <div class="change-body">
        <p style="font-size: 2.5rem; margin-bottom: 1rem;">✅</p>
        <p>Your password has been changed successfully.</p>
        <hr class="gold-divider mt-3">
        <a href="{% url 'home' %}" class="btn btn-gold px-4">Back to Dashboard</a>
    </div>
</div>
{% endblock %}
