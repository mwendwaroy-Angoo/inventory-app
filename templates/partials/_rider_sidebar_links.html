<!-- Rider Sidebar Navigation -->
<div class="sidebar-section">
    <div class="sidebar-section-title">Dashboard</div>
    <a href="{% url 'rider_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'rider_dashboard' %}active{% endif %}">
        <span class="icon">🏠</span> Overview
    </a>
</div>

<div class="sidebar-section">
    <div class="sidebar-section-title">Deliveries</div>
    <a href="{% url 'rider_active_deliveries' %}" class="sidebar-link {% if request.resolver_match.url_name == 'rider_active_deliveries' %}active{% endif %}">
        <span class="icon">🚴</span> Active Deliveries
    </a>
    <a href="{% url 'rider_delivery_history' %}" class="sidebar-link {% if request.resolver_match.url_name == 'rider_delivery_history' %}active{% endif %}">
        <span class="icon">📜</span> Delivery History
    </a>
</div>

<div class="sidebar-section">
    <div class="sidebar-section-title">Earnings</div>
    <a href="{% url 'rider_earnings' %}" class="sidebar-link {% if request.resolver_match.url_name == 'rider_earnings' %}active{% endif %}">
        <span class="icon">💰</span> My Earnings
    </a>
</div>

<div class="sidebar-section">
    <div class="sidebar-section-title">Profile</div>
    <a href="#" class="sidebar-link" id="sidebarToggleAvail" onclick="event.preventDefault(); sidebarToggleAvailability();">
        <span class="icon">🔄</span> Toggle Availability
    </a>
</div>

<script>
function sidebarToggleAvailability() {
    const link = document.getElementById('sidebarToggleAvail');
    fetch('{% url "rider_toggle_availability" %}', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': '{{ csrf_token }}',
        },
    })
    .then(r => r.json())
    .then(data => {
        const status = data.is_available ? '🟢 Available' : '🔴 Unavailable';
        link.innerHTML = '<span class="icon">🔄</span> ' + status;
        /* Also update dashboard toggle if on that page */
        const toggle = document.getElementById('availToggle');
        const text = document.getElementById('availText');
        if (toggle && text) {
            toggle.className = data.is_available ? 'status-toggle available' : 'status-toggle unavailable';
            text.textContent = data.is_available ? 'Available' : 'Unavailable';
        }
    });
}
</script>
