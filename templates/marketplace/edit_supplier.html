{% extends "base.html" %}

{% block title %}Edit Supplier — Duka Mwecheche{% endblock %}

{% block content %}
<div style="max-width:500px; margin:2rem auto;">
    <h3 style="font-family:'Playfair Display',serif; color:var(--gold);">✏️ Edit Supplier Notes</h3>
    <p style="color:var(--muted);">{{ link.supplier.name }}</p>

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-control" rows="4"
                      placeholder="e.g. payment terms, contact person, delivery schedule">{{ link.notes }}</textarea>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-gold">Save</button>
            <a href="{% url 'supplier_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
