{% extends "base.html" %}

{% block title %}Edit Staff — Duka Mwecheche{% endblock %}

{% block extra_css %}
<style>
    .staff-form-card {
        max-width: 520px;
        margin: 0 auto;
        background: var(--onyx-card);
        border: 1px solid #333;
        border-top: 3px solid var(--gold);
        border-radius: 12px;
        overflow: hidden;
    }

    .staff-form-header {
        background: linear-gradient(135deg, var(--raspberry-dark), var(--raspberry));
        padding: 1.5rem 2rem;
    }

    .staff-form-header h3 {
        font-family: 'Playfair Display', serif;
        color: white;
        margin: 0;
    }

    .staff-form-body { padding: 2rem; }

    .section-divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0 1rem;
    }

    .section-divider span {
        font-family: 'Playfair Display', serif;
        color: var(--gold);
        font-size: 0.95rem;
        padding-right: 1rem;
        white-space: nowrap;
    }

    .section-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--gold), transparent);
    }
</style>
{% endblock %}

{% block content %}

<nav style="font-size:0.8rem; color:var(--muted); margin-bottom:1rem;">
    <a href="{% url 'home' %}" style="color:var(--gold)">Dashboard</a>
    <span class="mx-1">›</span>
    <a href="{% url 'staff_list' %}" style="color:var(--gold)">Staff</a>
    <span class="mx-1">›</span>
    <span>Edit Staff</span>
</nav>

<div class="staff-form-card">
    <div class="staff-form-header">
        <h3>✏️ Edit Staff — {{ profile.user.username }}</h3>
    </div>
    <div class="staff-form-body">
        <form method="post">
            {% csrf_token %}

            <div class="section-divider"><span>👤 Personal Details</span></div>

            <div class="mb-3">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" class="form-control"
                       value="{{ profile.user.first_name }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" class="form-control"
                       value="{{ profile.user.last_name }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control"
                       value="{{ profile.phone }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control"
                       value="{{ profile.user.email }}">
            </div>

            <div class="d-flex gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="{% url 'staff_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
