{% extends "base.html" %}
{% block content %}
<h2>Staff Members</h2>
<a href="{% url 'add_staff' %}" class="btn btn-primary mb-3">Add New Staff</a>
<table class="table">
    <thead>
        <tr>
            <th>Username</th>
            <th>Name</th>
            <th>Email</th>
        </tr>
    </thead>
    <tbody>
        {% for profile in staff %}
        <tr>
            <td>{{ profile.user.username }}</td>
            <td>{{ profile.user.get_full_name }}</td>
            <td>{{ profile.user.email }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No staff members yet.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
