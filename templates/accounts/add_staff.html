{% extends "base.html" %}
{% block content %}
<h2>Add Staff Member</h2>
<form method="post">
    {% csrf_token %}
    {% load django_bootstrap5 %}
    {% bootstrap_form form %}
    <button type="submit" class="btn btn-primary">Add Staff</button>
    <a href="{% url 'staff_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
